name: Build and Release Slurm Packages

on:
  workflow_dispatch:
    inputs:
      slurm_version:
        description: 'Slurm version'
        required: true
        default: '25.11.4'
      slurm_md5sum:
        description: 'Slurm source tarball MD5 checksum'
        required: true
        default: 'fc759abe52f407520b348eac9b887c1c'
      cuda_version:
        description: 'CUDA NVML version (e.g. 13-1)'
        required: true
        default: '13-1'
      rocm_version:
        description: 'ROCm version (e.g. 6.4.2)'
        required: true
        default: '6.4.2'
      pyxis_version:
        description: 'Pyxis version (e.g. 0.23.0)'
        required: true
        default: '0.23.0'
      ubuntu_version:
        description: 'Ubuntu version (leave blank to skip Ubuntu builds)'
        required: false
        default: '24.04'
      rocky_version:
        description: 'Rocky Linux version (leave blank to skip Rocky builds)'
        required: false
        default: '9.3'

jobs:
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      slurm-matrix: ${{ steps.set-matrix.outputs.slurm_matrix }}
      pyxis-matrix: ${{ steps.set-matrix.outputs.pyxis_matrix }}
    steps:
      - id: set-matrix
        run: |
          SLURM='{"include":['
          PYXIS='{"include":['
          FIRST=true

          if [ -n "${{ inputs.ubuntu_version }}" ]; then
            UV=$(echo "${{ inputs.ubuntu_version }}" | tr -d '.')
            SLURM="${SLURM}{\"target\":\"docker-build-ubuntu-amd64\",\"name\":\"ubuntu${UV}-amd64\",\"runner\":\"ubuntu-latest\"}"
            SLURM="${SLURM},{\"target\":\"docker-build-ubuntu-arm64\",\"name\":\"ubuntu${UV}-arm64\",\"runner\":\"ubuntu-24.04-arm\"}"
            PYXIS="${PYXIS}{\"target\":\"docker-build-pyxis-ubuntu-amd64\",\"name\":\"pyxis-ubuntu${UV}-amd64\",\"runner\":\"ubuntu-latest\",\"slurm-artifact\":\"slurm-${{ inputs.slurm_version }}-ubuntu${UV}-amd64\"}"
            PYXIS="${PYXIS},{\"target\":\"docker-build-pyxis-ubuntu-arm64\",\"name\":\"pyxis-ubuntu${UV}-arm64\",\"runner\":\"ubuntu-24.04-arm\",\"slurm-artifact\":\"slurm-${{ inputs.slurm_version }}-ubuntu${UV}-arm64\"}"
            FIRST=false
          fi

          if [ -n "${{ inputs.rocky_version }}" ]; then
            RV=$(echo "${{ inputs.rocky_version }}" | tr -d '.')
            if [ "$FIRST" = false ]; then SLURM="${SLURM},"; PYXIS="${PYXIS},"; fi
            SLURM="${SLURM}{\"target\":\"docker-build-rocky-amd64\",\"name\":\"rocky${RV}-amd64\",\"runner\":\"ubuntu-latest\"}"
            SLURM="${SLURM},{\"target\":\"docker-build-rocky-arm64\",\"name\":\"rocky${RV}-arm64\",\"runner\":\"ubuntu-24.04-arm\"}"
            PYXIS="${PYXIS}{\"target\":\"docker-build-pyxis-rocky-amd64\",\"name\":\"pyxis-rocky${RV}-amd64\",\"runner\":\"ubuntu-latest\",\"slurm-artifact\":\"slurm-${{ inputs.slurm_version }}-rocky${RV}-amd64\"}"
            PYXIS="${PYXIS},{\"target\":\"docker-build-pyxis-rocky-arm64\",\"name\":\"pyxis-rocky${RV}-arm64\",\"runner\":\"ubuntu-24.04-arm\",\"slurm-artifact\":\"slurm-${{ inputs.slurm_version }}-rocky${RV}-arm64\"}"
          fi

          SLURM="${SLURM}]}"
          PYXIS="${PYXIS}]}"
          echo "slurm_matrix=${SLURM}" >> "$GITHUB_OUTPUT"
          echo "pyxis_matrix=${PYXIS}" >> "$GITHUB_OUTPUT"

  build-slurm:
    needs: matrix-setup
    if: needs.matrix-setup.outputs.slurm-matrix != '{"include":[]}'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.slurm-matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Slurm packages
        run: |
          make ${{ matrix.target }} \
            CI=1 \
            SLURM_VERSION=${{ inputs.slurm_version }} \
            SLURM_MD5SUM=${{ inputs.slurm_md5sum }} \
            CUDA_VERSION=${{ inputs.cuda_version }} \
            ROCM_VERSION=${{ inputs.rocm_version }} \
            UBUNTU_VERSION=${{ inputs.ubuntu_version }} \
            ROCKY_VERSION=${{ inputs.rocky_version }}

      - name: Upload Slurm artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: slurm-${{ inputs.slurm_version }}-${{ matrix.name }}
          path: output/*.tar.gz
          retention-days: 5

  build-pyxis:
    needs: [matrix-setup, build-slurm]
    if: needs.matrix-setup.outputs.pyxis-matrix != '{"include":[]}'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.pyxis-matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download Slurm artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.slurm-artifact }}
          path: output/

      - name: Build Pyxis packages
        run: |
          make ${{ matrix.target }} \
            CI=1 \
            SLURM_VERSION=${{ inputs.slurm_version }} \
            PYXIS_VERSION=${{ inputs.pyxis_version }} \
            UBUNTU_VERSION=${{ inputs.ubuntu_version }} \
            ROCKY_VERSION=${{ inputs.rocky_version }}

      - name: Upload Pyxis artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pyxis-${{ inputs.pyxis_version }}-${{ matrix.name }}
          path: output/pyxis-*.tar.gz
          retention-days: 5

  release:
    needs: [build-slurm, build-pyxis]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate release tag
        id: tag
        run: |
          TAG="${{ inputs.slurm_version }}-rocm${{ inputs.rocm_version }}-cuda${{ inputs.cuda_version }}-pyxis${{ inputs.pyxis_version }}-$(date +%Y%m%d)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect tarballs
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          echo "Release artifacts:"
          ls -lh release/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Slurm ${{ inputs.slurm_version }} (CUDA ${{ inputs.cuda_version }}, ROCm ${{ inputs.rocm_version }}, Pyxis ${{ inputs.pyxis_version }})
          draft: true
          generate_release_notes: false
          body: |
            ## Slurm ${{ inputs.slurm_version }} packages

            | Parameter | Value |
            |-----------|-------|
            | Slurm | ${{ inputs.slurm_version }} |
            | Pyxis | ${{ inputs.pyxis_version }} |
            | CUDA NVML | ${{ inputs.cuda_version }} |
            | ROCm | ${{ inputs.rocm_version }} |
            | Ubuntu | ${{ inputs.ubuntu_version || 'skipped' }} |
            | Rocky | ${{ inputs.rocky_version || 'skipped' }} |
            | Source MD5 | `${{ inputs.slurm_md5sum }}` |

            ### Artifacts
            Each Slurm tarball contains .deb or .rpm packages for the target platform.
            Both GPU plugins (gpu_nvml.so and gpu_rsmi.so) are included where supported (amd64).
            arm64 builds include gpu_nvml.so only (ROCm is x86_64 only).

            Pyxis tarballs contain the nvslurm-plugin-pyxis package built against the corresponding Slurm version.
          files: release/*.tar.gz
